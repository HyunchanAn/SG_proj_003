name: V-SAMS CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Cache Pip Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install System Dependencies
      run: |
        sudo apt-get update --fix-missing || true
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 || true

    - name: Install Package and Dev Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run Ruff Lint Check
      run: |
        python -m ruff check .

    - name: Run Ruff Formatting Check
      run: |
        python -m ruff format --check .

    - name: Run Mypy and Push Report
      run: |
        python -m mypy --ignore-missing-imports --check-untyped-defs vsams/ > mypy_report.txt || true
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add mypy_report.txt
        git commit -m "chore: update mypy report [skip ci]" || true
        git push origin main || true
        # Now run it normally to fail the build if there are errors
        python -m mypy --ignore-missing-imports --check-untyped-defs vsams/

    - name: Execute Full Suite of Tests
      run: |
        python -m pytest tests/
